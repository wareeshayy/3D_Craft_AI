<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DCraft AI - Text to 3D Model Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .form-section {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Generation Container */
        .generation-container {
            padding: 40px;
            text-align: center;
            min-height: 200px;
        }

        .generation-container.loading {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .generation-container.processing {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .generation-container.completed {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .generation-container.error {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 25px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            background: white;
            height: 100%;
            border-radius: 25px;
            transition: width 0.3s ease;
            min-width: 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-message {
            font-size: 14px;
            opacity: 0.9;
        }

        /* Results Section */
        .results-section {
            padding: 40px;
            background: #f8f9fa;
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .download-link {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Preview */
        .preview-container {
            margin-top: 20px;
            text-align: center;
        }

        .model-preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .preview-controls {
            margin-top: 15px;
        }

        .fullscreen-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        /* Success Animation */
        .success-animation {
            display: none;
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 60%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            80% { transform: translateY(-10px); }
        }

        /* Error Alert */
        .error-alert {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .error-text {
            flex: 1;
            margin: 0 15px;
        }

        .close-error {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #dc3545;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 10px;
            }
        }

        /* Hidden by default */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 3DCraft AI</h1>
            <p>Transform your ideas into stunning 3D models with AI</p>
        </div>

        <div class="main-card">
            <!-- Generation Form -->
            <div class="form-section">
                <form id="generation-form">
                    <div class="form-group">
                        <label for="prompt">🎯 Describe your 3D model:</label>
                        <textarea 
                            id="prompt" 
                            name="prompt" 
                            class="form-control" 
                            rows="3" 
                            placeholder="A futuristic spaceship with sleek design and glowing blue lights..."
                            required
                        ></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="style">🎨 Style:</label>
                            <select id="style" name="style" class="form-control">
                                <option value="realistic">Realistic</option>
                                <option value="cartoon">Cartoon</option>
                                <option value="abstract">Abstract</option>
                                <option value="sci-fi">Sci-Fi</option>
                                <option value="fantasy">Fantasy</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="complexity">⚙️ Complexity:</label>
                            <select id="complexity" name="complexity" class="form-control">
                                <option value="low">Low (Fast)</option>
                                <option value="medium" selected>Medium (Balanced)</option>
                                <option value="high">High (Detailed)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="generate-btn" id="generate-btn">
                        ✨ Generate 3D Model
                    </button>
                </form>
            </div>

            <!-- Generation Status -->
            <div id="generation-container" class="generation-container hidden">
                <div id="success-animation" class="success-animation">🎉</div>
                <div class="loading-spinner"></div>
                <h3 id="status-title">Generating Your 3D Model...</h3>
                <div id="generation-progress"></div>
                <div id="error-message" class="hidden"></div>
            </div>
        </div>

        <!-- Results Card -->
        <div id="results-card" class="main-card hidden">
            <div class="results-section">
                <h2>🎊 Your 3D Model is Ready!</h2>
                
                <!-- Preview Section -->
                <div id="model-preview"></div>
                
                <!-- Download Links -->
                <div id="download-links"></div>
                
                <!-- Model Info -->
                <div id="model-info" class="hidden">
                    <h3>📋 Model Information</h3>
                    <div id="model-details"></div>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="main-card">
            <div class="form-section">
                <h2>📚 Recent Generations</h2>
                <div id="generation-history"></div>
                <button id="load-history-btn" class="generate-btn" style="margin-top: 20px;">
                    📖 Load Generation History
                </button>
            </div>
        </div>
    </div>

    <!-- Include the 3D Model Service -->
    <script src="js/3dModelService.js"></script>
    
    <script>
        // Enhanced frontend integration script
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize the model generator
            const modelGenerator = new ModelGeneratorService('http://127.0.0.1:8000');
            
            // DOM elements
            const form = document.getElementById('generation-form');
            const generateBtn = document.getElementById('generate-btn');
            const generationContainer = document.getElementById('generation-container');
            const resultsCard = document.getElementById('results-card');
            const statusTitle = document.getElementById('status-title');
            const loadHistoryBtn = document.getElementById('load-history-btn');
            
            // Form submission handler
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Get form data
                const formData = new FormData(form);
                const prompt = formData.get('prompt').trim();
                const style = formData.get('style');
                const complexity = formData.get('complexity');
                
                if (!prompt) {
                    alert('Please enter a description for your 3D model!');
                    return;
                }
                
                // Show generation container and hide results
                showGenerationContainer();
                hideResultsCard();
                
                // Disable form
                setFormDisabled(true);
                
                try {
                    // Start generation
                    const generationId = await modelGenerator.generate3DModel(prompt, {
                        style,
                        complexity,
                        formats: ['obj', 'gltf', 'stl']
                    });
                    
                    console.log('Generation started:', generationId);
                    
                } catch (error) {
                    console.error('Generation failed:', error);
                    showError('Failed to start generation: ' + error.message);
                    setFormDisabled(false);
                }
            });
            
            // Event listeners for generation events
            modelGenerator.on('generationComplete', function(data) {
                console.log('Generation completed!', data);
                showResultsCard();
                setFormDisabled(false);
                
                // Show model information
                showModelInfo(data.result);
            });
            
            modelGenerator.on('generationError', function(data) {
                console.error('Generation error:', data);
                showError(data.error);
                setFormDisabled(false);
            });
            
            modelGenerator.on('generationProgress', function(data) {
                console.log('Progress update:', data.progress + '%');
                updateStatusTitle(data);
            });
            
            // Load history button
            loadHistoryBtn.addEventListener('click', async function() {
                try {
                    const response = await fetch('http://127.0.0.1:8000/api/generate/history');
                    const data = await response.json();
                    displayGenerationHistory(data.generations);
                } catch (error) {
                    console.error('Failed to load history:', error);
                    alert('Failed to load generation history');
                }
            });
            
            // Helper functions
            function showGenerationContainer() {
                generationContainer.classList.remove('hidden');
                generationContainer.className = 'generation-container loading';
                statusTitle.textContent = 'Starting generation...';
            }
            
            function hideGenerationContainer() {
                generationContainer.classList.add('hidden');
            }
            
            function showResultsCard() {
                resultsCard.classList.remove('hidden');
                generationContainer.className = 'generation-container completed';
                statusTitle.textContent = '✅ Generation completed successfully!';
                
                // Auto-hide generation container after 3 seconds
                setTimeout(() => {
                    hideGenerationContainer();
                }, 3000);
            }
            
            function hideResultsCard() {
                resultsCard.classList.add('hidden');
            }
            
            function setFormDisabled(disabled) {
                const formElements = form.querySelectorAll('input, textarea, select, button');
                formElements.forEach(element => {
                    element.disabled = disabled;
                });
                
                if (disabled) {
                    generateBtn.innerHTML = '⏳ Generating...';
                } else {
                    generateBtn.innerHTML = '✨ Generate 3D Model';
                }
            }
            
            function showError(message) {
                generationContainer.className = 'generation-container error';
                statusTitle.textContent = '❌ Generation Failed';
                
                const errorDiv = document.getElementById('error-message');
                errorDiv.innerHTML = `
                    <div class="error-alert">
                        <span class="error-icon">❌</span>
                        <span class="error-text">${message}</span>
                        <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="close-error">×</button>
                    </div>
                `;
                errorDiv.classList.remove('hidden');
            }
            
            function updateStatusTitle(data) {
                const statusMap = {
                    'pending': '⏳ Preparing generation...',
                    'processing': '🎨 AI is creating your 3D model...',
                    'ai_processing': '🧠 AI analyzing your prompt...',
                    'mesh_generation': '🔧 Building 3D mesh...',
                    'blender_processing': '⚙️ Processing with Blender...',
                    'uploading': '☁️ Uploading your model...',
                    'completed': '✅ Generation completed!',
                    'failed': '❌ Generation failed'
                };
                
                statusTitle.textContent = statusMap[data.status] || data.status;
                
                if (data.status === 'processing') {
                    generationContainer.className = 'generation-container processing';
                }
            }
            
            function showModelInfo(model) {
                const modelInfo = document.getElementById('model-info');
                const modelDetails = document.getElementById('model-details');
                
                modelDetails.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                        <div>
                            <strong>📝 Prompt:</strong><br>
                            <span style="background: #f8f9fa; padding: 10px; border-radius: 5px; display: block; margin-top: 5px;">
                                ${model.prompt}
                            </span>
                        </div>
                        <div>
                            <strong>🎨 Style:</strong> ${model.style}<br>
                            <strong>⚙️ Complexity:</strong> ${model.complexity}<br>
                            <strong>📅 Created:</strong> ${new Date(model.created_at).toLocaleDateString()}<br>
                            <strong>🆔 Model ID:</strong> ${model.id.substring(0, 8)}...
                        </div>
                    </div>
                `;
                
                modelInfo.classList.remove('hidden');
            }
            
            function displayGenerationHistory(generations) {
                const historyContainer = document.getElementById('generation-history');
                
                if (!generations || generations.length === 0) {
                    historyContainer.innerHTML = '<p>No previous generations found.</p>';
                    return;
                }
                
                const historyHTML = generations.slice(0, 5).map(gen => `
                    <div style="background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 10px; border-left: 4px solid ${getStatusColor(gen.status)};">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong>${gen.prompt.substring(0, 50)}${gen.prompt.length > 50 ? '...' : ''}</strong>
                            <span class="status-badge" style="background: ${getStatusColor(gen.status)}; color: white; padding: 4px 8px; border-radius: 15px; font-size: 12px;">
                                ${gen.status.toUpperCase()}
                            </span>
                        </div>
                        <div style="margin-top: 10px; font-size: 14px; color: #666;">
                            <span>🎨 ${gen.style}</span> • 
                            <span>⚙️ ${gen.complexity}</span> • 
                            <span>📅 ${new Date(gen.created_at).toLocaleDateString()}</span>
                        </div>
                        ${gen.status === 'completed' && gen.result ? `
                            <div style="margin-top: 10px;">
                                <button onclick="window.open('${gen.result.preview_image}', '_blank')" 
                                        style="background: #667eea; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;">
                                    👀 View Preview
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
                
                historyContainer.innerHTML = historyHTML;
            }
            
            function getStatusColor(status) {
                const colors = {
                    'pending': '#ffc107',
                    'processing': '#17a2b8',
                    'completed': '#28a745',
                    'failed': '#dc3545',
                    'cancelled': '#6c757d'
                };
                return colors[status] || '#6c757d';
            }
            
            // Auto-load history on page load
            setTimeout(() => {
                loadHistoryBtn.click();
            }, 1000);
        });
    </script>
</body>
</html>
